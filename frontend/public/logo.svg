<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8356d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5804d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9284f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8356d;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#e8356d" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner subtle overlay -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112"
    fill="url(#bgGrad2)" opacity="0.3"/>

  <!-- Instagram camera outline shape -->
  <rect x="136" y="136" width="240" height="240" rx="68" ry="68"
    fill="none" stroke="white" stroke-width="26" opacity="0.25"/>

  <!-- Download arrow — thick, bold, centered -->
  <!-- Vertical line -->
  <line x1="256" y1="168" x2="256" y2="288"
    stroke="white" stroke-width="36" stroke-linecap="round"/>

  <!-- Arrow head -->
  <polyline points="188,254 256,322 324,254"
    fill="none" stroke="white" stroke-width="36"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom tray line -->
  <line x1="176" y1="352" x2="336" y2="352"
    stroke="white" stroke-width="30" stroke-linecap="round"/>

  <!-- Small dot top right (Instagram style) -->
  <circle cx="352" cy="164" r="18" fill="white" opacity="0.9"/>
</svg>
